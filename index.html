<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TileGraphAgent — Industrial 3D Viewer</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Cesium.js">

  </script>
</head>

<body>
  <div id="cesium-container">
  </div>
  <div class="ai-bar overflow-auto [scrollbar-width:thin] default-browser vertical-scroll-fade-mask">
    <textarea class="ai-bar__input overflow-auto [scrollbar-width:thin]" rows="1"
      placeholder="Ask anything, or use / to browse actions…">
    </textarea>
    <div class="ai-bar__footer">
      <div class="ai-bar__tools">
        
      </div>
      <div class="ai-bar__actions">
        <button type="button" class="ai-bar__icon-button" aria-label="Dictate">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"
            xmlns="http://www.w3.org/2000/svg">
            <path
              d="M18.25 11C18.6297 11 18.9435 11.2822 18.9932 11.6482L19 11.75V12.25C19 15.8094 16.245 18.7254 12.751 18.9817L12.75 21.25C12.75 21.6642 12.4142 22 12 22C11.6203 22 11.3065 21.7178 11.2568 21.3518L11.25 21.25L11.25 18.9818C7.83323 18.7316 5.12283 15.938 5.00406 12.4863L5 12.25V11.75C5 11.3358 5.33579 11 5.75 11C6.1297 11 6.44349 11.2822 6.49315 11.6482L6.5 11.75V12.25C6.5 15.077 8.73445 17.3821 11.5336 17.4956L11.75 17.5H12.25C15.077 17.5 17.3821 15.2656 17.4956 12.4664L17.5 12.25V11.75C17.5 11.3358 17.8358 11 18.25 11ZM12 2C14.2091 2 16 3.79086 16 6V12C16 14.2091 14.2091 16 12 16C9.79086 16 8 14.2091 8 12V6C8 3.79086 9.79086 2 12 2ZM12 3.5C10.6193 3.5 9.5 4.61929 9.5 6V12C9.5 13.3807 10.6193 14.5 12 14.5C13.3807 14.5 14.5 13.3807 14.5 12V6C14.5 4.61929 13.3807 3.5 12 3.5Z"
              fill="currentColor">
            </path>
          </svg>
        </button> <button type="button" class="ai-bar__send" aria-label="Send" disabled="">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"
            xmlns="http://www.w3.org/2000/svg">
            <path
              d="M4.20889 10.7327C3.9232 11.0326 3.93475 11.5074 4.23467 11.7931C4.5346 12.0788 5.00933 12.0672 5.29502 11.7673L11.2495 5.516V20.25C11.2495 20.6642 11.5853 21 11.9995 21C12.4137 21 12.7495 20.6642 12.7495 20.25V5.51565L18.7043 11.7673C18.99 12.0672 19.4648 12.0788 19.7647 11.7931C20.0646 11.5074 20.0762 11.0326 19.7905 10.7327L12.7238 3.31379C12.5627 3.14474 12.3573 3.04477 12.1438 3.01386C12.0971 3.00477 12.0489 3 11.9995 3C11.9498 3 11.9012 3.00483 11.8543 3.01406C11.6412 3.04518 11.4363 3.14509 11.2756 3.31379L4.20889 10.7327Z"
              fill="currentColor">
            </path>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div id="sidebar">
    <div class="panel" id="model-tree-panel">
      <h3>Model Tree</h3>
      <p class="loading">Loading...</p>
    </div>

    <div class="panel" id="selection-panel">
      <h3>Properties</h3>
      <p class="panel-note">Click an object.</p>
    </div>

    <div class="panel" id="audit-panel">
      <h3>Audit Log</h3>
      <p class="panel-note">No tool calls yet.</p>
    </div>

    <div id="agent-panel">
      <div class="panel" style="padding:0 0 8px 0; border:none">
        <h3>Agent Chat</h3>
      </div>
      <div id="agent-messages">
        <div class="msg-assistant">
          TileGraphAgent ready. Ask a question about the plant, e.g.:<br />
          <em>"Find all pumps connected to LINE-1001 and explain the maintenance impact."</em>
        </div>
      </div>
      <div id="agent-input-row">
        <input id="agent-input" type="text" placeholder="Ask about the plant..." />
        <button id="agent-submit">Ask</button>
      </div>
    </div>

    <div id="status-bar">TileGraphAgent v0.1.0 | Synthetic EPC Plant V1</div>
  </div>

  <script type="module" src="/src/main.ts">

  </script>
</body>

</html>
